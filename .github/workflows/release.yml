name: Release
run-name: Release to ${{ inputs.environment || 'staging' }} by @${{ github.actor }}

permissions:
  contents: write
  packages: write
  issues: read
  pull-requests: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run deployment in"
        type: environment
        required: true
        default: production

env:
  NODE_AUTH_TOKEN: ${{ secrets.STACKLA_BOT_GITHUB_TOKEN }}

jobs:
  release:
    concurrency:
      group: releases
      cancel-in-progress: true
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.STACKLA_BOT_GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Install
        run: npm install
      - uses: ./.github/workflows/aws
        with:
          aws-region: ${{ vars.AWS_REGION }}
      - name: Build & Release
        run: |
          aws s3 sync dist/ s3://ugc-nextgen-widgets-ap-southeast-2/templates/utils/${{ inputs.environment }}/ --delete
          npx changeset version
          git config user.name "$(gh api user --jq '.name // .login')"
          git config user.email "$(gh api user --jq '"\(.id)+\(.login)@users.noreply.github.com"')"
          git add .
          git commit -m "chore: release [skip ci]" || true
          git push origin master
          npm publish --registry=https://registry.npmjs.org/
          npm publish --registry=https://npm.pkg.github.com/
        env:
          GH_TOKEN: ${{ secrets.STACKLA_BOT_GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.STACKLA_BOT_GITHUB_TOKEN }}
