name: Release Snapshot/Testing NPM Packages
on:
  workflow_dispatch:

env:
  NODE_AUTH_TOKEN: ${{secrets.STACKLA_BOT_GITHUB_TOKEN}}

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install
        run: npm ci
      - run: npm run build
      - run: npx changeset version --snapshot
      - run: npm publish --no-git-checks --tag snapshot --registry https://npm.pkg.github.com
